# Source charm: ./tox.ini
# This file is managed centrally by release-tools and should not be modified
# within individual charm repos.  See the 'global' dir contents for available
# choices of tox.ini for OpenStack Charms:
#     https://github.com/openstack-charmers/release-tools

[tox]
skipsdist = True
envlist = pep8,py3
sitepackages = False
skip_missing_interpreters = False
minversion = 3.18.0

[vars]
src_path = {toxinidir}/src/
tst_path = {toxinidir}/tests/
lib_path = {toxinidir}/lib/
pyproject_toml = {toxinidir}/pyproject.toml
all_path = {[vars]src_path} {[vars]tst_path}
uv_flags = --frozen --isolated --extra=dev

[testenv]
basepython = python3
setenv =
  # Set TEST_JUJU3 To unpin juju<3 in zaza
  TEST_JUJU3 = 1
  PYTHONPATH = {toxinidir}:{[vars]lib_path}:{[vars]src_path}
passenv =
  PYTHONPATH
  HOME
  DBUS_SESSION_BUS_ADDRESS
install_command =
  pip install {opts} {packages}
commands =
  rm -f {toxinidir}/metadata.yaml {toxinidir}/actions.yaml {toxinidir}/config.yaml
  uv run {[vars]uv_flags} pytest tests/unit -v --tb=short {posargs}
  rm -f {toxinidir}/metadata.yaml {toxinidir}/actions.yaml {toxinidir}/config.yaml
allowlist_externals =
  rm
  git
  charmcraft
  {toxinidir}/fetch-libs.sh
  {toxinidir}/rename.sh
  uv

[testenv:fmt]
description = Apply coding style standards to code
commands =
    uv run --isolated --with isort python -m isort {[vars]all_path} --skip-glob {[vars]lib_path}
    uv run --isolated --with black python -m black --config {[vars]pyproject_toml} {[vars]all_path} --exclude {[vars]lib_path}

[testenv:build]
basepython = python3
deps =
commands =
  charmcraft -v pack
  {toxinidir}/rename.sh

[testenv:fetch]
basepython = python3
deps =
commands =
  {toxinidir}/fetch-libs.sh

[testenv:py3]
basepython = python3

[testenv:py38]
basepython = python3.8

[testenv:py39]
basepython = python3.9

[testenv:py310]
basepython = python3.10

[testenv:py312]
basepython = python3.12

[testenv:cover]
basepython = python3
setenv =
    {[testenv]setenv}
    PYTHON=coverage run
commands =
    uv run {[vars]uv_flags} coverage erase
    uv run {[vars]uv_flags} pytest tests/unit --cov=. --cov-branch --cov-config={[vars]pyproject_toml} --cov-report=html:cover --cov-report=xml:cover/coverage.xml --cov-report=term {posargs}

[testenv:pep8]
description = Alias for lint
commands = {[testenv:lint]commands}

[testenv:lint]
description = Check code against coding style standards
commands =
    uv run --isolated --with codespell codespell {[vars]all_path}
    # pflake8 wrapper supports config from pyproject.toml
    uv run --isolated --with flake8 --with flake8-docstrings --with flake8-copyright --with flake8-builtins --with pyproject-flake8 --with pep8-naming python -m pflake8 --exclude {[vars]lib_path} --config {toxinidir}/pyproject.toml {[vars]all_path}
    uv run --isolated --with isort python -m isort --check-only --diff {[vars]all_path} --skip-glob {[vars]lib_path}
    uv run --isolated --with black python -m black --target-version py312 --config {[vars]pyproject_toml} --check --diff {[vars]all_path} --exclude {[vars]lib_path}

[testenv:func-noop]
basepython = python3
commands =
    uv run {[vars]uv_flags} pytest tests/functional --help

[testenv:func]
basepython = python3
commands =
    uv run {[vars]uv_flags} pytest {posargs:tests/functional} -v --tb=short

[testenv:func-smoke]
basepython = python3
commands = {[testenv:func]commands}

[testenv:func-dev]
basepython = python3
commands = {[testenv:func]commands}

[testenv:func-target]
basepython = python3
commands = {[testenv:func]commands}

[testenv:lock]
description = Update lock file
commands =
    uv lock --upgrade --no-cache
