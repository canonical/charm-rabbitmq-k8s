name: TICS scan

on:
  schedule:
    - cron: '10 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
    TICS:
      runs-on: [self-hosted, linux, amd64, tiobe]
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup uv
          uses: astral-sh/setup-uv@v7

        - name: Install dependencies
          run: |
            sudo apt update

        - name: Run coverage tests
          run: uv run --with tox tox -e cover

        - name: Activate and prepare Python virtual environment
          run: |
            uv sync --extra=dev
            source .venv/bin/activate
            uv pip install pylint flake8

        - name: TICS
          uses: tiobe/tics-github-action@v3
          with:
            mode: qserver
            viewerUrl: https://canonical.tiobe.com/tiobeweb/TICS/api/cfg?name=default
            ticsAuthToken: ${{ secrets.TICSAUTHTOKEN }}
            project: charm-rabbitmq-k8s
            branchdir: ${{ env.GITHUB_WORKSPACE }}
            installTics: true
