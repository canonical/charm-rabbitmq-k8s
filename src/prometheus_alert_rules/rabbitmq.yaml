groups:
  - name: RabbitMQ
    rules:
      - alert: RabbitMQNodeDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: RabbitMQ node is down
          description: |
            RabbitMQ metrics have stopped scraping for this unit.

      - alert: RabbitMQDiskAlarm
        expr: rabbitmq_alarms_free_disk_space_watermark == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RabbitMQ disk alarm is active
          description: |
            RabbitMQ has raised its free disk space alarm.

      - alert: RabbitMQDiskHeadroomLow
        expr: rabbitmq_disk_space_available_bytes / rabbitmq_disk_space_available_limit_bytes < 4
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RabbitMQ disk headroom is low
          description: |
            RabbitMQ free disk space is approaching its configured limit.

      - alert: RabbitMQMemoryAlarm
        expr: rabbitmq_alarms_memory_used_watermark == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RabbitMQ memory alarm is active
          description: |
            RabbitMQ has raised its memory watermark alarm.

      - alert: RabbitMQMemoryHeadroomHigh
        expr: rabbitmq_process_resident_memory_bytes / rabbitmq_resident_memory_limit_bytes > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RabbitMQ memory pressure is elevated
          description: |
            RabbitMQ resident memory usage is above 80 percent of its limit.

      - alert: RabbitMQFDAlarm
        expr: rabbitmq_alarms_file_descriptor_limit == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RabbitMQ file descriptor alarm is active
          description: |
            RabbitMQ is hitting its file descriptor watermark.

      - alert: RabbitMQRaftCommitLatencyHigh
        expr: rabbitmq_raft_entry_commit_latency_seconds > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RabbitMQ raft commit latency is high
          description: |
            Quorum queue raft commit latency has been above 500ms for 10 minutes.

      - alert: RabbitMQRaftUncommittedEntriesHigh
        expr: (rabbitmq_raft_log_last_written_index - rabbitmq_raft_log_commit_index) > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RabbitMQ raft backlog is high
          description: |
            Quorum queue raft logs are accumulating uncommitted entries.
